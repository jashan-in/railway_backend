<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private WebRTC Camera</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
      margin: 0;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    input, button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-right: 10px;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    video {
      width: 100%;
      max-width: 900px;
      background: black;
      border-radius: 16px;
      margin-top: 20px;
    }

    #status {
      margin-top: 10px;
      color: #fcd34d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Private WebRTC Camera</h1>
    <p>Start the live room stream only when needed.</p>

    <input type="password" id="password" placeholder="Enter camera password" />
    <button id="startBtn">Start Stream</button>
    <button id="stopBtn">Stop Stream</button>

    <div id="status">Waiting to start...</div>
    <video id="video" autoplay playsinline muted></video>
  </div>

  <script>
    const SERVER_URL = "https://isogonally-optical-katharine.ngrok-free.dev";
    let pc = null;

    async function startStream() {
      const password = document.getElementById("password").value;
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      if (!password) {
        status.textContent = "Enter the camera password.";
        return;
      }

      status.textContent = "Starting stream...";

      try {
        pc = new RTCPeerConnection({
          iceServers: [
            { urls: "stun:stun.l.google.com:19302" }
          ]
        });

        pc.ontrack = (event) => {
          video.srcObject = event.streams[0];
        };

        pc.onconnectionstatechange = () => {
          status.textContent = `Connection: ${pc.connectionState}`;
        };

        const transceiver = pc.addTransceiver("video", {
          direction: "recvonly"
        });

        // Prefer H.264 on the browser too, when supported
        if (window.RTCRtpReceiver &&
            RTCRtpReceiver.getCapabilities &&
            transceiver.setCodecPreferences) {
          const codecs = RTCRtpReceiver.getCapabilities("video").codecs || [];
          const h264 = codecs.filter(c => c.mimeType === "video/H264");
          if (h264.length) {
            transceiver.setCodecPreferences(h264);
          }
        }

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const response = await fetch(`${SERVER_URL}/offer`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            sdp: pc.localDescription.sdp,
            type: pc.localDescription.type,
            password
          })
        });

        if (!response.ok) {
          const text = await response.text();
          status.textContent = `Failed to start stream: ${text}`;
          return;
        }

        const answer = await response.json();
        await pc.setRemoteDescription(answer);

        status.textContent = "Live stream started.";
      } catch (err) {
        console.error(err);
        status.textContent = `Error: ${err.message}`;
      }
    }

    function stopStream() {
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      if (pc) {
        pc.close();
        pc = null;
      }

      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }

      status.textContent = "Stream stopped.";
    }

    document.getElementById("startBtn").addEventListener("click", startStream);
    document.getElementById("stopBtn").addEventListener("click", stopStream);
  </script>
</body>
</html>
